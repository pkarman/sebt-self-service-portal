<!DOCTYPE html>
<html lang="{{Language}}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Your {{StateName}} Login Code</title>
    <!--[if mso]>
      <noscript>
        <xml>
          <o:OfficeDocumentSettings>
            <o:PixelsPerInch>96</o:PixelsPerInch>
          </o:OfficeDocumentSettings>
        </xml>
      </noscript>
    <![endif]-->
    <style type="text/css">
      /* Reset styles */
      body,
      table,
      td,
      p,
      a,
      li,
      blockquote {
        -webkit-text-size-adjust: 100%;
        -ms-text-size-adjust: 100%;
      }
      table,
      td {
        mso-table-lspace: 0pt;
        mso-table-rspace: 0pt;
      }
      img {
        -ms-interpolation-mode: bicubic;
        border: 0;
        height: auto;
        line-height: 100%;
        outline: none;
        text-decoration: none;
      }
      body {
        margin: 0 !important;
        padding: 0 !important;
        width: 100% !important;
        background-color: #f5f5f5;
      }

      /* Main styles */
      .email-container {
        max-width: 600px;
        margin: 0 auto;
        background-color: #ffffff;
      }
      .email-body {
        padding: 40px 30px;
        font-family: "Source Sans Pro", -apple-system, BlinkMacSystemFont,
          "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        font-size: 16px;
        line-height: 1.5;
        color: #1b1b1b;
      }
      .otp-code {
        font-size: 36px;
        font-weight: 700;
        letter-spacing: 4px;
        color: #1b1b1b;
        margin: 24px 0;
      }
      .expiry-warning {
        font-size: 14px;
        color: #5c5c5c;
        margin-top: 24px;
      }
      .signature {
        margin-top: 32px;
      }
      .logo-container {
        margin-top: 12px;
      }

      /* Responsive */
      @media screen and (max-width: 600px) {
        .email-body {
          padding: 30px 20px !important;
        }
        .otp-code {
          font-size: 28px !important;
        }
      }
    </style>
  </head>
  <body style="margin: 0; padding: 0; background-color: #f5f5f5">
    <table
      role="presentation"
      cellspacing="0"
      cellpadding="0"
      border="0"
      width="100%"
      style="background-color: #f5f5f5"
    >
      <tr>
        <td style="padding: 20px 0">
          <table
            role="presentation"
            cellspacing="0"
            cellpadding="0"
            border="0"
            width="600"
            class="email-container"
            style="margin: 0 auto; background-color: #ffffff"
          >
            <tr>
              <td
                class="email-body"
                style="
                  padding: 40px 30px;
                  font-family: 'Source Sans Pro', -apple-system,
                    BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue',
                    Arial, sans-serif;
                  font-size: 16px;
                  line-height: 1.5;
                  color: #1b1b1b;
                "
              >
                <!-- TODO: Internationalize email body text for multi-language support -->
                <p style="margin: 0 0 16px 0">
                  Use this code to log in to your account.
                </p>

                <p
                  class="otp-code"
                  style="
                    font-size: 36px;
                    font-weight: 700;
                    letter-spacing: 4px;
                    color: #1b1b1b;
                    margin: 24px 0;
                  "
                >
                  {{OtpCode}}
                </p>

                <p
                  class="expiry-warning"
                  style="
                    font-size: 14px;
                    color: #5c5c5c;
                    margin-top: 24px;
                    margin-bottom: 0;
                  "
                >
                  The code will expire in {{ExpiryMinutes}} minutes. Do not
                  share this code with anyone.
                </p>

                <p
                  class="signature"
                  style="margin-top: 32px; margin-bottom: 0"
                >
                  {{ProgramName}}
                </p>

                <div class="logo-container" style="margin-top: 12px">
                  {{LogoHtml}}
                </div>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
