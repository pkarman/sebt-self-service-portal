# Docker Compose configuration for SEBT Portal Application and supporting services
services:
  # SEBT Portal API Service
  sebt.portal.api:
    image: sebt.portal.api
    build:
      context: .
      dockerfile: Dockerfile
      args:
        STATE: ${STATE:-dc}
    ports:
      - "5280:8080"   # Maps localhost:5280 -> container:8080
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - STATE=${STATE:-dc}
      # Note: TrustServerCertificate=True bypasses TLS certificate validation and should ONLY be used for local development.
      # Do NOT include this in connection strings for deployed environments (UAT, production).
      - ConnectionStrings__DefaultConnection=Server=${MSSQL_SERVER:-mssql},${MSSQL_PORT:-1433};Database=${MSSQL_DATABASE:-SebtPortal};User Id=${MSSQL_USER:-sa};Password=${MSSQL_SA_PASSWORD:-YourStrong@Passw0rd};TrustServerCertificate=True;
      - SmtpClientSettings__SmtpServer=mailpit
    depends_on:
      mssql:
        condition: service_healthy
    networks:
      - sebt.portal.api

  # SEBT Email Service
  mailpit:
    image: axllent/mailpit
    container_name: sebt_mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    environment:
      - MP_MAX_MESSAGES=5000
    networks:
      - sebt.portal.api

  # Redis Cache (used as distributed cache backing for HybridCache)
  redis:
    image: redis:7-alpine
    container_name: sebt_redis
    ports:
      - "6379:6379"
    networks:
      - sebt.portal.api
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis web UI for local dev — browse keys, inspect values, verify TTLs.
  # Open http://localhost:8081 (auto-connects to the redis service above).
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: sebt_redis_commander
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    networks:
      - sebt.portal.api
    depends_on:
      - redis
    restart: unless-stopped

  # Jaeger (OpenTelemetry trace/metrics viewer for local development)
  jaeger:
    image: jaegertracing/jaeger:latest
    container_name: sebt_jaeger
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC receiver
      - "4318:4318"    # OTLP HTTP receiver
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - sebt.portal.api

  # MSSQL Server Database
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sebt_mssql
    ports:
      - "${MSSQL_PORT:-1433}:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD:-YourStrong@Passw0rd}
      - MSSQL_PID=Developer
    volumes:
      - mssql_data:/var/opt/mssql
    networks:
      - sebt.portal.api
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U ${MSSQL_USER:-sa} -P ${MSSQL_SA_PASSWORD:-YourStrong@Passw0rd} -Q 'SELECT 1' -C -b -o /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

# Define custom networks
networks:
  sebt.portal.api:
    driver: bridge

# Define volumes
volumes:
  mssql_data:
