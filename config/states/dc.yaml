# District of Columbia (DC) State Configuration

state: dc
version: "1.0.0"  # State-specific version for tracking deployments

infrastructure:
  use_docker: false
  docker:
    registry: "ghcr.io/codeforamerica"
    network_mode: "bridge"
    build_args: {}
  native:
    install_path: "/opt/sebt-dc"
    cache_dir: "/var/cache/sebt-dc"

versions:
  node: "24"
  pnpm: "10"
  dotnet: "10.0"

build:
  configuration: "Release"
  frontend_flags: ""
  backend_flags: "-p:BuildFrontend=false"  # Skip frontend build (frontend built separately in native build)
  skip_tests: false

environment:
  API_BASE_URL: "https://dc.sebt.gov/api"
  features:
    multi_language: true
    advanced_search: true
    experimental_ui: false

deployment:
  enabled: false
  target: "production"
  notify_on_success: true
  notify_on_failure: true
