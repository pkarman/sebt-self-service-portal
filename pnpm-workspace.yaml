packages:
  - src/SEBT.Portal.Web
  - src/SEBT.EnrollmentChecker.Web
  - packages/*

overrides:
  tmp@<=0.2.3: '>=0.2.4'

# [SECURITY] Enforce minimum package age. Consult Security Team before updating.
minimumReleaseAge: 10080 # 7 days (minutes)

# [SECURITY] Version-pinned exemptions to the cooldown above. Each entry must
# reference a specific package@version, so the exemption ages out automatically
# on the next version bump. Justify each addition with a CVE or ticket link.
minimumReleaseAgeExclude:
  # DC-410: CVE-2026-45109 (High) — middleware/proxy bypass via segment-prefetch.
  # Includes next + its sibling @next/* packages that ship from the same Vercel
  # release. Remove once minimumReleaseAge naturally allows 16.2.6 (after 2026-05-14).
  - next@16.2.6
  - '@next/env@16.2.6'
  - '@next/swc-darwin-arm64@16.2.6'
  - '@next/swc-darwin-x64@16.2.6'
  - '@next/swc-linux-arm64-gnu@16.2.6'
  - '@next/swc-linux-arm64-musl@16.2.6'
  - '@next/swc-linux-x64-gnu@16.2.6'
  - '@next/swc-linux-x64-musl@16.2.6'
  - '@next/swc-win32-arm64-msvc@16.2.6'
  - '@next/swc-win32-x64-msvc@16.2.6'
